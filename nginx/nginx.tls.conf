events {}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;

  upstream backend_upstream {
    server backend:8000;
  }

  server {
    listen 80;
    server_name __APP_DOMAIN__ __APP_WWW_DOMAIN__;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://__APP_CANONICAL_HOST__$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    server_name __APP_WWW_DOMAIN__;

    ssl_certificate /etc/letsencrypt/live/__APP_CANONICAL_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__APP_CANONICAL_HOST__/privkey.pem;

    return 301 https://__APP_CANONICAL_HOST__$request_uri;
  }

  server {
    listen 443 ssl http2;
    server_name __APP_DOMAIN__;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/__APP_CANONICAL_HOST__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__APP_CANONICAL_HOST__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location /api/ws/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
